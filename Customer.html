<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Customers</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
    <div class="container">
        <aside id="aside">
            <div class="top">
                <div class="logo">
                    <h2>C<span class="danger">Ordoro</span></h2>
                </div>
                <div id="close_btn" class="close">
                    <span class="material-symbols-outlined"> close </span>
                </div>
            </div>
            <div class="sidebar">
                <a href="index.html">
                    <span class="material-symbols-outlined"> List </span>
                    <h3>Dashboard</h3>
                </a>
                <a href="Brand.html">
                    <span class="material-symbols-outlined"> Style </span>
                    <h3>Brands</h3>
                </a>
                <a href="brandStock.html">
                    <span class="material-symbols-outlined"> Inventory_2 </span>
                    <h3>BrandStock</h3>
                </a>
                <a href="supplierStock.html">
                    <span class="material-symbols-outlined"> Inventory_2 </span>
                    <h3>SupplierStock</h3>
                </a>
                <a href="Customer.html">
                    <span class="material-symbols-outlined"> person_outline </span>
                    <h3>Customers</h3>
                </a>
                <a href="Associated Brands.html">
                    <span class="material-symbols-outlined"> Shopping_cart_checkout </span>
                    <h3>Associated Brands</h3>
                </a>
                <a href="Purchase.html">
                    <span class="material-symbols-outlined"> Payments </span>
                    <h3>Purchase</h3>
                    <!-- <span class="msg_count">14</span> -->
                </a>
                <a href="login.html">
                    <span class="material-symbols-outlined"> logout </span>
                    <h3>logout</h3>
                </a>
            </div>
            <!-- top end -->
        </aside>
        <main style="margin-top: 0rem;">
          <div class="recent_order">
              <h1>Customer</h1>
              <table>
                  <thead>
                      <tr>
                          <th>CustomerID</th>
                          <th>Customer Name</th>
                          <th>Email</th>
                          <th>Address</th>
                          <th>Options</th>
                      </tr>
                  </thead>
                  <tbody>
                      <!-- Data will be dynamically populated here -->
                  </tbody>
              </table>
          </div>
          <!-- Add button -->
          <div class="button-container">
            <button id="addButton" class="button">Add</button>
        </div>
        <!-- Popup modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
            <span class="close" onclick="getElementById('modal').style.display = 'none';" >&times;</span>
            <h2>Add Customer</h2>
                <form id="customerForm">
            <div class="form-group">
                <label for="customerName">Customer Name:</label>
                <input type="text" id="customerName" name="customerName" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <textarea id="address" name="address" required></textarea>
            </div>
            <div class="form-group">
                <button type="submit" class="button">Submit</button>
            </div>
                </form>
            </div>
        </div>

      </main>
    </div>

    <script src="config.js"></script>
    <script src="customer.js"></script>
    <script>
        // Apply dark mode if it was enabled before
        const isDarkMode = localStorage.getItem('dark-theme-variables') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-theme-variables');
        }
    </script>
</body>
</html>
